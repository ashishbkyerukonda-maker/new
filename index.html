<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Valentine Page</title>

  <style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #ffe6e6;
  font-family: "Segoe UI", sans-serif;
  overflow: hidden;
  text-align: center;
}

.container {
  position: relative;
}

h1 {
  color: #ff4d6d;
  font-size: 2.5rem;
}

img {
  width: 220px;
  margin: 20px 0;
}

.buttons {
  position: relative;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin: 10px;
  transition: all 0.2s ease;
}

#yesBtn {
  background: #28a745;
  color: white;
  transform: scale(1);
}

#noBtn {
  background: #dc3545;
  color: white;
  position: absolute;
}

  </style>
</head>

<body>

  <div class="container">
  <h1 id="question">Naanuuu.... Do you love me ??</h1>

  <img id="gif" src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">

  <div class="buttons">
    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>
  </div>
</div>
  <script>
    const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const question = document.getElementById("question");

let scale = 1;
let noClicks = 0;

// Move "No" button randomly
function moveNoButton() {
  const maxX = window.innerWidth - noBtn.offsetWidth;
  const maxY = window.innerHeight - noBtn.offsetHeight;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveNoButton);

noBtn.addEventListener("click", () => {
  noClicks++;

  // Increase Yes button size
  scale += 0.2;
  yesBtn.style.transform = `scale(${scale})`;

  moveNoButton();
});

// Yes button click → final state
yesBtn.addEventListener("click", () => {
  document.body.innerHTML = `
    <div style="text-align:center;">
      <h1 style="color:#ff4d6d;">CUMTIELLUUU .. I LOVE YOU MOREEE</h1>
      <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" width="250"/>
      <h2>I knew you'd say yes 😍</h2>
    </div>
  `;
});

  </script>

</body>
</html>
